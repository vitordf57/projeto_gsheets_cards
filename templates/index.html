<script>
const principal = document.getElementById("principal");
const enviando = document.getElementById("enviando");
const naoEnviar = document.getElementById("naoEnviar");
const contEnv = document.getElementById("contEnv");
const contNao = document.getElementById("contNao");
const contadorPrincipal = document.getElementById("contadorPrincipal");

const filtroConta = document.getElementById("filtroConta");
const filtroBusca = document.getElementById("filtroBusca");
const filtroSelo = document.getElementById("filtroSelo");
const filtroLogica = document.getElementById("filtroLogica");
const filtroSaude = document.getElementById("filtroSaude");

let dadosOriginais = [];
let comentariosSalvos = {};
let filtroEspecial = "";
let statusSalvos = {};
let telaAtual = "principal";

const urlParams = new URLSearchParams(window.location.search);
let filtroUrlMagic = urlParams.get("magic") || "";
let filtroUrlCobertura = urlParams.get("cobertura") || "";
let filtroUrlFull = urlParams.get("full") || "";
let filtroUrlSaudeFull = urlParams.get("saudeFull") || "";
let filtroUrlConta = urlParams.get("conta") || "";

let skuCounts = {};
let tituloCounts = {};

let dadosFiltradosBase = [];
let dadosTelaAtual = [];

let indiceRender = 0;
const LOTE_RENDER = 80;
let renderizando = false;
let debounceTimer = null;

function valorParaNumero(v){
    if(!v) return 0;
    return Number(String(v).replaceAll(".","").replace(",","."));
}

function textoNormalizado(v){
    return String(v || "").toUpperCase().trim();
}

function numeroInteiro(v){

}

    if (v === null || v === undefined || v === "") return 0;
    return Math.round(Number(String(v).replaceAll(".", "").replace(",", ".")) || 0);
}

function sugestaoIA(item){
    const estoqueEmpresa = numeroInteiro(item["ESTOQUE TOTAL SIGNUS"]);
    const estoqueFull = numeroInteiro(item["ESTOQUE FULL"]);
    const vendas30 = numeroInteiro(item["30 DIAS"]);
    const valor30 = valorParaNumero(item["Total de Vendas 30 DIAS"]);
    const metrica30 = numeroInteiro(item["METRICAS 30 DIAS DO MELI"]);
    const visitas30 = numeroInteiro(item["VISITAS 30 DIAS"]);

    const saude = textoNormalizado(item["SAUDE DO ESTOQUE 4i"]);
    const analise = textoNormalizado(item["ANALISE"]);
    const selo = textoNormalizado(item["SELO"]);
    const tendencia = textoNormalizado(item["Tendência 30-0"] || item["Tendência 30"]);
    const acao = textoNormalizado(item["Ação Recomendada"]);
    const sugestaoMeli = textoNormalizado(item["SUGESTAO MELI"]);

    let score = 0;
    const motivosPositivos = [];
    const motivosNegativos = [];

    if (vendas30 >= 4){
        score += 1;
        motivosPositivos.push("Venda de 30 dias é relevante");
    } else {
        motivosNegativos.push("Venda de 30 dias está baixa");
    }

    if (valor30 >= 500){
        score += 1;
        motivosPositivos.push("Faturamento dos últimos 30 dias é bom");
    } else {
        motivosNegativos.push("Faturamento dos últimos 30 dias está fraco");
    }

    if (metrica30 >= 60){
        score += 1;
        motivosPositivos.push("Métrica MELI está boa");
    } else {
        motivosNegativos.push("Métrica MELI está abaixo do ideal");
    }

    if (visitas30 >= 80){
        score += 1;
        motivosPositivos.push("Volume de visitas está bom");
    } else {
        motivosNegativos.push("Volume de visitas está baixo");
    }

    if (
        tendencia.includes("ALTA") ||
        tendencia.includes("SUBINDO") ||
        tendencia.includes("CRESCIMENTO") ||
        tendencia.includes("POSITIVA")
    ){
        score += 1;
        motivosPositivos.push("Tendência está positiva");
    }

    if (
        saude.includes("REPOSIÇÃO URGENTE") ||
        saude.includes("RUPTURA") ||
        saude.includes("ESTOQUE BAIXO")
    ){
        score += 1;
        motivosPositivos.push("Saúde do estoque pede reposição");
    }

    if (
        analise.includes("ANALISE DE ENVIO") ||
        sugestaoMeli.includes("ENVIAR") ||
        acao.includes("ENVIAR") ||
        acao.includes("REPOR")
    ){
        score += 1;
        motivosPositivos.push("Lógica operacional indica envio");
    }

    if (
        selo.includes("FULL") ||
        selo.includes("PREMIUM")
    ){
        score += 1;
        motivosPositivos.push("Anúncio tem selo relevante");
    }

    const metricasBoas = score >= 4 && vendas30 > 0;
    const necessidade30Dias = Math.max(vendas30 - estoqueFull, 0);

    let sugestao = 0;
    let statusIA = "NÃO ENVIAR";
    let detalhe = "";
    let classe = "ia-nao-enviar";
    let explicacao = "";

    if (!metricasBoas){
        sugestao = 0;
        statusIA = "NÃO ENVIAR";
        detalhe = "Métricas insuficientes";
        classe = "ia-nao-enviar";
        explicacao = "O MLB não está performando bem o suficiente para justificar reposição agora.";
    }
    else if (necessidade30Dias <= 0){
        sugestao = 0;
        statusIA = "NÃO ENVIAR";
        detalhe = "Full já cobre 30 dias";
        classe = "ia-nao-enviar";
        explicacao = "O estoque que já está no Full é suficiente para cobrir pelo menos 30 dias de venda.";
    }
    else if (estoqueEmpresa < necessidade30Dias){
        sugestao = 0;
        statusIA = "REPOR ESTOQUE EMPRESA";
        detalhe = `Precisa ${necessidade30Dias} e empresa tem ${estoqueEmpresa}`;
        classe = "ia-repor";
        explicacao = "Mesmo com bom potencial de venda, a empresa não tem estoque suficiente para repor 30 dias completos. O ideal é repor o estoque interno antes de enviar.";
    }
    else{
        sugestao = necessidade30Dias;
        statusIA = `ENVIAR ${sugestao} UN.`;
        detalhe = "Reposição completa de 30 dias";
        classe = "ia-enviar";
        explicacao = "O MLB tem bom potencial, o Full não cobre 30 dias e a empresa tem estoque suficiente para fazer a reposição completa.";
    }

    const motivosHtml = `
        <div><strong>Motivo principal:</strong> ${explicacao}</div>
        <div class="ia-score"><strong>Score:</strong> ${score}</div>
        <div><strong>Venda 30 dias:</strong> ${vendas30}</div>
        <div><strong>Estoque Full:</strong> ${estoqueFull}</div>
        <div><strong>Estoque empresa:</strong> ${estoqueEmpresa}</div>
        <div><strong>Necessidade p/ 30 dias:</strong> ${necessidade30Dias}</div>
        <div><strong>Saúde:</strong> ${saude || "SEM DADO"}</div>
        <div><strong>Análise:</strong> ${analise || "SEM DADO"}</div>
        <div style="margin-top:8px;"><strong>Pontos positivos:</strong> ${motivosPositivos.length ? motivosPositivos.join(" | ") : "Nenhum"}</div>
        <div style="margin-top:6px;"><strong>Pontos de atenção:</strong> ${motivosNegativos.length ? motivosNegativos.join(" | ") : "Nenhum"}</div>
    `;

    return {
        sugestao,
        statusIA,
        detalhe,
        score,
        classe,
        tooltip: motivosHtml
    };
}

function montarIndices(){
    skuCounts = {};
    tituloCounts = {};

    for (const item of dadosOriginais){
        const sku = String(item["SKU"] || "").trim();
        const titulo = String(item["Título"] || "").trim();

        if (sku){
            skuCounts[sku] = (skuCounts[sku] || 0) + 1;
        }

        if (titulo){
            tituloCounts[titulo] = (tituloCounts[titulo] || 0) + 1;
        }
    }
}

function analisarSKU(item){
    const sku = String(item["SKU"] || "").trim();
    const titulo = String(item["Título"] || "").trim();

    return {
        qtdSKU: Math.max((skuCounts[sku] || 1) - 1, 0),
        qtdTitulo: Math.max((tituloCounts[titulo] || 1) - 1, 0)
    };
}

function tituloDuplicado(titulo){
    const t = String(titulo || "").trim();
    return (tituloCounts[t] || 0) > 1;
}

function obterDestino(item){
    const codigo = String(item["Código do Anúncio"]);
    const registro = statusSalvos[codigo] || {};
    const status = registro.status || "principal";

    if (status === "enviando") return "enviando";
    if (status === "nao_enviar" || status === "naoEnviar") return "naoEnviar";
    return "principal";
}

function atualizarContadores(){
    const totalPrincipal = dadosFiltradosBase.filter(item => obterDestino(item) === "principal").length;
    const totalEnviando = dadosFiltradosBase.filter(item => obterDestino(item) === "enviando").length;
    const totalNao = dadosFiltradosBase.filter(item => obterDestino(item) === "naoEnviar").length;

    contEnv.innerText = totalEnviando;
    contNao.innerText = totalNao;

    if (telaAtual === "principal"){
        contadorPrincipal.innerText = `${totalPrincipal} MLBs`;
    } else if (telaAtual === "enviando"){
        contadorPrincipal.innerText = `${totalEnviando} MLBs`;
    } else {
        contadorPrincipal.innerText = `${totalNao} MLBs`;
    }
}

function mostrarTela(tela){
    telaAtual = tela;

    principal.classList.add("hidden");
    enviando.classList.add("hidden");
    naoEnviar.classList.add("hidden");

    document.getElementById(tela).classList.remove("hidden");

    renderCards();
    window.scrollTo({ top: 0, behavior: "instant" });
}

function setFiltro(tipo){
    filtroEspecial = tipo;
    renderCards();
}

function limparFiltros(){
    document.querySelectorAll(".menu select,.menu input").forEach(e => e.value = "");
    filtroEspecial = "";
    filtroUrlMagic = "";
    filtroUrlCobertura = "";
    filtroUrlFull = "";
    filtroUrlSaudeFull = "";
    filtroUrlConta = "";
    history.replaceState({}, "", "/");
    renderCards();
}

function popularFiltros(){
    function unique(col){
        return [...new Set(dadosOriginais.map(d => d[col]).filter(v => v))];
    }

    filtroSelo.innerHTML = '<option value="">Todos os selos</option>';
    filtroLogica.innerHTML = '<option value="">Toda lógica</option>';
    filtroSaude.innerHTML = '<option value="">Toda saúde</option>';

    unique("SELO").forEach(v => filtroSelo.innerHTML += `<option value="${v}">${v}</option>`);
    unique("ANALISE").forEach(v => filtroLogica.innerHTML += `<option value="${v}">${v}</option>`);
    unique("SAUDE DO ESTOQUE 4i").forEach(v => filtroSaude.innerHTML += `<option value="${v}">${v}</option>`);
}

function aplicarFiltrosBase(){
    const conta = filtroConta.value;
    const busca = filtroBusca.value.toLowerCase().trim();
    const selo = filtroSelo.value;
    const logica = filtroLogica.value;
    const saude = filtroSaude.value;

    return dadosOriginais.filter(item => {
        if (conta && String(item["Nickname"] || "").toLowerCase() !== conta.toLowerCase()) return false;

        if (
    filtroUrlConta &&
    String(item["Nickname"] || "").toUpperCase().trim() !== filtroUrlConta.toUpperCase().trim()
) return false;

        if (
            busca &&
            !String(item["SKU"] || "").toLowerCase().includes(busca) &&
            !String(item["Código do Anúncio"] || "").toLowerCase().includes(busca)
        ) return false;

        if (selo && String(item["SELO"] || "").trim() !== String(selo).trim()) return false;
        if (logica && String(item["ANALISE"] || "").trim() !== String(logica).trim()) return false;
        if (saude && String(item["SAUDE DO ESTOQUE 4i"] || "").trim() !== String(saude).trim()) return false;

        if (
            filtroUrlMagic &&
            String(item["MAGIC"] || "").toUpperCase().trim() !== filtroUrlMagic.toUpperCase().trim()
        ) return false;

        if (
            filtroUrlFull &&
            String(item["Full"] || "").toUpperCase().trim() !== filtroUrlFull.toUpperCase().trim()
        ) return false;

        if (
            filtroUrlSaudeFull &&
            String(item["SAUDE_ESTOQUE_FULL"] || "").toUpperCase().trim() !== filtroUrlSaudeFull.toUpperCase().trim()
        ) return false;

        if (filtroUrlCobertura === "baixo30"){
            const textoCobertura = String(item["Cobertura"] || "");
            const matchDias = textoCobertura.match(/(\d+)\s*dias/i);
            const dias = matchDias ? Number(matchDias[1]) : null;

            if (dias === null || dias >= 30) return false;
        }

        let unidades = Number(item["30 DIAS"] || 0);
        let valor = valorParaNumero(item["Total de Vendas 30 DIAS"]);

        if (filtroEspecial === "valor500" && valor <= 500) return false;
        if (filtroEspecial === "unidades10" && unidades <= 10) return false;
        if (filtroEspecial === "critico" && !(unidades < 10 && valor > 500)) return false;

        return true;
    });
}

function obterDestino(item){
    const codigo = String(item["Código do Anúncio"]);
    const registro = statusSalvos[codigo] || {};
    const status = registro.status || "principal";

    if (status === "enviando") return "enviando";
    if (status === "nao_enviar" || status === "naoEnviar") return "naoEnviar";
    return "principal";
}

function montarHTMLCard(item){
    const sugestoes = sugestaoIA(item);
    const analise = analisarSKU(item);

    return `
    <div class="linha-topo">
        <div class="mlb-area">
            <div class="mlb">${item["Código do Anúncio"]}</div>
            <div class="badges">

function renderProximoLote(){
    if (renderizando) return;
    if (indiceRender >= dadosTelaAtual.length) return;

    renderizando = true;

    const container = document.getElementById(telaAtual);
    const fragment = document.createDocumentFragment();

    const fim = Math.min(indiceRender + LOTE_RENDER, dadosTelaAtual.length);

    for (let i = indiceRender; i < fim; i++){
        const item = dadosTelaAtual[i];
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = montarHTMLCard(item);
        fragment.appendChild(card);
    }

    container.appendChild(fragment);
    indiceRender = fim;
    renderizando = false;
}

function atualizarLinkExportacao(){
    const params = new URLSearchParams();

    if (filtroConta.value) params.set("conta", filtroConta.value);
    if (filtroBusca.value) params.set("busca", filtroBusca.value);
    if (filtroSelo.value) params.set("selo", filtroSelo.value);
    if (filtroLogica.value) params.set("logica", filtroLogica.value);
    if (filtroSaude.value) params.set("saude", filtroSaude.value);

    if (filtroUrlMagic) params.set("magic", filtroUrlMagic);
    if (filtroUrlCobertura) params.set("cobertura", filtroUrlCobertura);
    if (filtroUrlFull) params.set("full", filtroUrlFull);
    if (filtroUrlSaudeFull) params.set("saudeFull", filtroUrlSaudeFull);
    if (filtroUrlConta) params.set("conta", filtroUrlConta);

    if (filtroEspecial) params.set("filtroEspecial", filtroEspecial);
    if (telaAtual) params.set("tela", telaAtual);

    document.getElementById("btnExportarExcel").href = "/exportar-excel?" + params.toString();
}

function renderCards(){
    dadosFiltradosBase = aplicarFiltrosBase();
    dadosTelaAtual = dadosFiltradosBase.filter(item => obterDestino(item) === telaAtual);

    principal.innerHTML = "";
    enviando.innerHTML = "";
    naoEnviar.innerHTML = "";

    indiceRender = 0;
    renderProximoLote();
    atualizarContadores();
    atualizarLinkExportacao();
}

function moverCard(codigo){
    const input = document.getElementById("qtd-" + codigo);
    const quantidade = Number(input ? input.value : 0);

    let status = "nao_enviar";
    if (quantidade > 0){
        status = "enviando";
    }

    fetch("/salvar-status", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            codigo: codigo,
            status: status,
            quantidade: quantidade
        })
    }).then(() => {
        statusSalvos[String(codigo)] = {
            status: status,
            quantidade: quantidade
        };
        renderCards();
    });
}

function voltarPrincipal(codigo){
    const quantidadeAtual = obterQuantidadeSalva(codigo);

    fetch("/salvar-status", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            codigo: codigo,
            status: "principal",
            quantidade: quantidadeAtual
        })
    }).then(() => {
        statusSalvos[String(codigo)] = {
            status: "principal",
            quantidade: quantidadeAtual
        };
        renderCards();
    });
}

function toggleComentario(codigo, sku){
    const box = document.getElementById("comentario-box-" + codigo);
    box.style.display = box.style.display === "none" ? "block" : "none";

    if(comentariosSalvos[sku]){
        document.getElementById("comentario-" + codigo).value = comentariosSalvos[sku];
    }
}

function salvarComentario(codigo, sku){
    const texto = document.getElementById("comentario-" + codigo).value;

    fetch("/salvar-comentario",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            sku: sku,
            comentario: texto
        })
    }).then(()=>{
        comentariosSalvos[sku] = texto;
        alert("Comentário salvo!");
    });
}

let skuAtualComentario = null;

function abrirComentario(codigo, sku){
    skuAtualComentario = sku;

    document.getElementById("textoComentario").value =
        localStorage.getItem("comentario_" + sku) || "";

    document.getElementById("modalComentario").style.display = "flex";
}

function fecharComentario(){
    document.getElementById("modalComentario").style.display = "none";
}

function salvarComentarioModal(){
    const texto = document.getElementById("textoComentario").value;
    localStorage.setItem("comentario_" + skuAtualComentario, texto);
    fecharComentario();
}

function aplicarRenderComDebounce(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        renderCards();
    }, 250);
}

filtroConta.addEventListener("change", renderCards);
filtroSelo.addEventListener("change", renderCards);
filtroLogica.addEventListener("change", renderCards);
filtroSaude.addEventListener("change", renderCards);
filtroBusca.addEventListener("input", aplicarRenderComDebounce);

window.addEventListener("scroll", () => {
    if ((window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 500)){
        renderProximoLote();
    }
});

Promise.all([
    fetch("/dados").then(r => r.json()),
    fetch("/status").then(r => r.json()),
    fetch("/comentarios").then(r => r.json())
]).then(([dados,status,comentarios])=>{
    dadosOriginais = dados;
    statusSalvos = status;
    comentariosSalvos = comentarios;

    montarIndices();
    popularFiltros();

    if(urlParams.get("saude")){
        filtroSaude.value = urlParams.get("saude");
    }

    if(urlParams.get("analise")){
        filtroLogica.value = urlParams.get("analise");
    }

    renderCards();
});
</script>

<div id="modalComentario" class="modal-comentario">
    <div class="modal-conteudo">
        <h3>Comentário do Produto</h3>

        <textarea id="textoComentario" placeholder="Digite seu comentário aqui..."></textarea>

        <div class="modal-botoes">
            <button onclick="salvarComentarioModal()">Salvar</button>
            <button onclick="fecharComentario()" class="btn-fechar">Cancelar</button>
        </div>
    </div>
</div>

<style>
    h1{

        font-weight:bold;

    }

    .kpi-item-value{
        font-size:30px;
        font-weight:bold;
        color:#111827;
    }

        grid-template-columns: 1fr 1fr;
        gap:20px;

    .chart-card{

<script>

function numero(v){
    if(v === null || v === undefined || v === "") return 0;
    return Number(String(v).replaceAll(".","").replace(",","."));
}

function extrairDiasCobertura(texto){
    const t = String(texto || "");
    const match = t.match(/(\d+)\s*dias/i);
    return match ? Number(match[1]) : null;
}

const urlParamsHome = new URLSearchParams(window.location.search);

function numero(v){
    if(v === null || v === undefined || v === "") return 0;
    return Number(String(v).replaceAll(".","").replace(",","."));
}

function extrairDiasCobertura(texto){
    const t = String(texto || "");
    const match = t.match(/(\d+)\s*dias/i);
    return match ? Number(match[1]) : null;
}

function textoNormalizado(valor){
    return String(valor || "").toUpperCase().trim();
}

function atualizarUrlFiltroStatusFull(){
    const params = new URLSearchParams(window.location.search);

    if (filtroStatusFullAtivo) {
        params.set("statusFullFiltro", filtroStatusFullAtivo);
    } else {
        params.delete("statusFullFiltro");
    }

    const query = params.toString();
    history.replaceState({}, "", "/home" + (query ? "?" + query : ""));
}

function irParaPainel(filtros){
    const params = new URLSearchParams();

    if (filtros.saude) params.set("saude", filtros.saude);
    if (filtros.saudeFull) params.set("saudeFull", filtros.saudeFull);
    if (filtros.analise) params.set("analise", filtros.analise);
    if (filtros.magic) params.set("magic", filtros.magic);
    if (filtros.cobertura) params.set("cobertura", filtros.cobertura);
    if (filtros.full) params.set("full", filtros.full);
    if (filtros.conta) params.set("conta", filtros.conta);
    if (filtros.tela) params.set("tela", filtros.tela);

    if (filtroStatusFullAtivo) {
        params.set("statusFullFiltro", filtroStatusFullAtivo);
    }

    window.location.href = "/?" + params.toString();
}


function porConta(dados, nickname){
    return dados.filter(item =>
        String(item["Nickname"] || "").toUpperCase().trim() === nickname.toUpperCase().trim()
    );
}

let filtroStatusFullAtivo = urlParamsHome.get("statusFullFiltro") || "";

let graficoEstrategias = null;
let estrategiaContextoAtual = "";


function aplicarFiltroStatusFull(lista){
    if (filtroStatusFullAtivo === "nao_ofereco_mais_full"){
        return lista.filter(item =>
            String(item["OBSERVAÇÃO MELI"] || "").trim() === "Você deixou de oferecer o Full."
        );
    }

    if (filtroStatusFullAtivo === "esta_no_full"){
        return lista.filter(item =>
            String(item["Full"] || "").trim().toUpperCase() === "NO FULL"
        );
    }

    if (filtroStatusFullAtivo === "nunca_foi_full"){
        return lista.filter(item => {
            const observacaoMeli = String(item["OBSERVAÇÃO MELI"] || "").trim();
            const full = String(item["Full"] || "").trim().toUpperCase();

            return observacaoMeli !== "Você deixou de oferecer o Full." && full !== "NO FULL";
        });
    }

    if (filtroStatusFullAtivo === "sem_venda"){
    return lista.filter(item => {
        const unidadesVendidas = textoNormalizado(
            item["Unidades Vendidas"] ||
            item["unidades vendidas"] ||
            item["UNIDADES VENDIDAS"] ||
            item["Unidades vendidas"] ||
            item["UNIDADE VENDIDA"] ||
            ""
        );

        return unidadesVendidas === "SEM VENDA";
    });
}

    return lista;
}


function renderGraficoEstrategias(dadosFiltrados, statusSalvos){
    const mapaEstrategias = {};

    dadosFiltrados.forEach(item => {
        const codigo = String(item["Código do Anúncio"] || "").trim();
        const registro = statusSalvos[codigo] || {};
        const estrategia = String(registro.estrategia || "").trim();

        if (!estrategia) return;

        const quantidade = Number(registro.quantidade || 0);
        mapaEstrategias[estrategia] = (mapaEstrategias[estrategia] || 0) + quantidade;
    });

    const ordenado = Object.entries(mapaEstrategias)
        .sort((a, b) => b[1] - a[1]);

    const labels = ordenado.map(item => item[0]);
    const valores = ordenado.map(item => item[1]);

    const canvas = document.getElementById("graficoEstrategias");
    if (!canvas) return;

    if (graficoEstrategias){
        graficoEstrategias.destroy();
        graficoEstrategias = null;
    }

    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!labels.length){
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "16px Arial";
        ctx.fillStyle = "#6b7280";
        ctx.fillText("Nenhuma estratégia com quantidade encontrada.", canvas.width / 2, canvas.height / 2);
        ctx.restore();
        return;
    }

    graficoEstrategias = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Quantidade",
                data: valores,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 35,
                        minRotation: 0
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });

    canvas.oncontextmenu = function(event){
        event.preventDefault();

        if (!graficoEstrategias) return false;

        const elementos = graficoEstrategias.getElementsAtEventForMode(
            event,
            "nearest",
            { intersect: true },
            true
        );

        if (!elementos || !elementos.length){
            fecharMenuContextoGrafico();
            return false;
        }

        const elemento = elementos[0];
        const label = graficoEstrategias.data.labels[elemento.index];

        if (!label){
            fecharMenuContextoGrafico();
            return false;
        }

        estrategiaContextoAtual = String(label || "").trim();
        abrirMenuContextoGrafico(event.clientX, event.clientY);
        return false;
    };
}



function abrirMenuContextoGrafico(x, y){
    const menu = document.getElementById("menuContextoGrafico");
    if (!menu) return;

    menu.classList.add("aberto");
    menu.style.left = x + "px";
    menu.style.top = y + "px";

    requestAnimationFrame(() => {
        const rect = menu.getBoundingClientRect();
        const maxX = window.innerWidth - rect.width - 10;
        const maxY = window.innerHeight - rect.height - 10;
        menu.style.left = Math.max(10, Math.min(x, maxX)) + "px";
        menu.style.top = Math.max(10, Math.min(y, maxY)) + "px";
    });
}

function fecharMenuContextoGrafico(){
    const menu = document.getElementById("menuContextoGrafico");
    if (!menu) return;
    menu.classList.remove("aberto");
}

function exportarEstrategiaContexto(){
    if (!estrategiaContextoAtual) return;
    window.location.href = "/exportar-excel-estrategia?estrategia=" + encodeURIComponent(estrategiaContextoAtual);
    fecharMenuContextoGrafico();
}

function renderDashboard(dados, statusSalvos){
    const dadosFiltrados = aplicarFiltroStatusFull(dados);

    const renaf = porConta(dadosFiltrados, "RENAFCAR");
    const conta4i = porConta(dadosFiltrados, "4IDISTRIBUIDORA");

    const rupturaRenaf = renaf.filter(item =>
        String(item["SAUDE_ESTOQUE_FULL"] || "").toUpperCase().trim() === "RUPTURA"
    ).length;

    const ruptura4i = conta4i.filter(item =>
        String(item["SAUDE_ESTOQUE_FULL"] || "").toUpperCase().trim() === "RUPTURA"
    ).length;

    const magicRenaf = renaf.filter(item =>
        String(item["MAGIC"] || "").toUpperCase().trim() === "SUG DE ENVIO MAGIC"
    ).length;

    const magic4i = conta4i.filter(item =>
        String(item["MAGIC"] || "").toUpperCase().trim() === "SUG DE ENVIO MAGIC"
    ).length;

    const baixo30Renaf = renaf.filter(item =>
        String(item["ANALISE"] || "").toUpperCase().trim() === "ANALISE DE ENVIO"
    ).length;

    const baixo304i = conta4i.filter(item =>
        String(item["ANALISE"] || "").toUpperCase().trim() === "ANALISE DE ENVIO"
    ).length;

    const acompanharRenaf = renaf.filter(item =>
        String(item["ANALISE"] || "").toUpperCase().trim() === "ACOMPANHAR"
    ).length;

    const acompanhar4i = conta4i.filter(item =>

    ).length; 

    let totalMlbEnviando = 0;
    let totalMlbNaoEnviar = 0;
    let totalMlbHomologar = 0;
    let totalPecasEnviando = 0;
    let totalPecasNaoEnviar = 0;
    let totalPecasHomologar = 0;

    dadosFiltrados.forEach(item => {
        const codigo = String(item["Código do Anúncio"] || "");
        const registro = statusSalvos[codigo] || {};
        const status = String(registro.status || "principal");
        const quantidade = Number(registro.quantidade || 0);

        if (status === "enviando") {
            totalMlbEnviando += 1;
            totalPecasEnviando += quantidade;
        }

        if (status === "nao_enviar" || status === "naoEnviar") {
            totalMlbNaoEnviar += 1;
            totalPecasNaoEnviar += quantidade;
        }

        if (status === "homologar") {
            totalMlbHomologar += 1;
            totalPecasHomologar += quantidade;
        }
    });

    document.getElementById("kpiMlbEnviando").innerText = totalMlbEnviando;
    document.getElementById("kpiMlbNaoEnviar").innerText = totalMlbNaoEnviar;
    document.getElementById("kpiMlbHomologar").innerText = totalMlbHomologar;
    document.getElementById("kpiPecasEnviando").innerText = totalPecasEnviando;
    document.getElementById("kpiPecasNaoEnviar").innerText = totalPecasNaoEnviar;
    document.getElementById("kpiPecasHomologar").innerText = totalPecasHomologar;

    renderGraficoEstrategias(dadosFiltrados, statusSalvos);

    const infoEstoqueMap = {};

    dadosFiltrados.forEach(item => {
        const valorOriginal = String(item["SAUDE DO ESTOQUE 4i"] || "").trim();
        const chave = valorOriginal !== "" ? valorOriginal : "SEM DADO";
        infoEstoqueMap[chave] = (infoEstoqueMap[chave] || 0) + 1;
    });

    const infoOrdenada = Object.entries(infoEstoqueMap)
        .sort((a, b) => b[1] - a[1]);

}

Promise.all([
    fetch("/dados-dashboard").then(r => r.json()),
    fetch("/status").then(r => r.json())
]).then(([dados, statusSalvos]) => {
    renderDashboard(dados, statusSalvos);
    carregarGraficoFull();
});

function fecharTodosPaineisStatusFull(){
    document.querySelectorAll(".painel-flutuante-status").forEach(painel => {
        painel.classList.remove("aberto");
    });
}

function togglePainelStatusFull(idPainel){
    const painel = document.getElementById(idPainel);
    if(!painel) return;

    const estavaAberto = painel.classList.contains("aberto");

    fecharTodosPaineisStatusFull();

    if(!estavaAberto){
        painel.classList.add("aberto");
    }
}

document.addEventListener("click", function(event){
    fecharTodosPaineisStatusFull();

    const menu = document.getElementById("menuContextoGrafico");
    if (menu && !menu.contains(event.target)){
        fecharMenuContextoGrafico();
    }
});

document.addEventListener("scroll", function(){
    fecharMenuContextoGrafico();
}, true);

document.addEventListener("keydown", function(event){
    if (event.key === "Escape"){
        fecharMenuContextoGrafico();
    }
});

function carregarGraficoFull(){
    fetch("/api/full-distribuicao")
        .then(res => res.json())
        .then(resp => {
            const container = document.getElementById("fullMetricasGrid");
            if (!container) return;

            container.innerHTML = "";

            if (!resp.ok || !resp.dados || !resp.dados.length) {
                container.innerHTML = `<div class="full-metrica-vazio">Nenhuma informação encontrada.</div>`;
                return;
            }

            resp.dados.forEach(item => {
                const card = document.createElement("div");
                card.className = "full-metrica-card";
                card.dataset.coluna = item.coluna || item.titulo;
                card.dataset.titulo = item.titulo;

                card.innerHTML = `
                    <div class="full-metrica-titulo">${item.titulo}</div>
                    <div class="full-metrica-valor">${item.valor}</div>
                `;

                card.onclick = () => {
                    document.querySelectorAll(".full-metrica-card").forEach(c => c.classList.remove("ativo"));
                    card.classList.add("ativo");
                    carregarDetalheMetricaFull(card.dataset.coluna, card.dataset.titulo);
                };

                container.appendChild(card);
            });
        })
        .catch(() => {
            const container = document.getElementById("fullMetricasGrid");
            if (!container) return;
            container.innerHTML = `<div class="full-metrica-vazio">Erro ao carregar informações do Full.</div>`;
        });
}

function carregarDetalheMetricaFull(coluna, titulo){
    fetch("/api/full-distribuicao-detalhe?coluna=" + encodeURIComponent(coluna))
        .then(res => res.json())
        .then(resp => {
            const box = document.getElementById("fullMetricasDetalheBox");
            const body = document.getElementById("fullMetricasDetalheBody");
            const tituloEl = document.getElementById("fullMetricasDetalheTitulo");

            if (!box || !body || !tituloEl) return;

            box.style.display = "block";
            tituloEl.innerText = "Detalhes - " + titulo;
            body.innerHTML = "";

            if (!resp.ok || !resp.dados || !resp.dados.length){
                body.innerHTML = `
                    <tr>
                        <td colspan="5" class="full-metricas-detalhe-vazio">Nenhum item encontrado para esta métrica.</td>
                    </tr>
                `;
                return;
            }

            resp.dados.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${item.mlb || ""}</td>
                    <td>${item.sku || ""}</td>
                    <td>${item.conta || ""}</td>
                    <td>${item.status || ""}</td>
                    <td>${item.unidades || 0}</td>
                `;
                body.appendChild(tr);
            });
        })
        .catch(() => {
            const box = document.getElementById("fullMetricasDetalheBox");
            const body = document.getElementById("fullMetricasDetalheBody");
            const tituloEl = document.getElementById("fullMetricasDetalheTitulo");

            if (!box || !body || !tituloEl) return;

            box.style.display = "block";
            tituloEl.innerText = "Detalhes";
            body.innerHTML = `
                <tr>
                    <td colspan="5" class="full-metricas-detalhe-vazio">Erro ao carregar os detalhes.</td>
                </tr>
            `;
        });
}

</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Estratégico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    box-sizing: border-box;
}

html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
}

body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f3f4f6;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #111827;
    color: white;
    height: 100vh;
    padding: 20px 10px;
    position: fixed;
    transition: width 0.3s ease;
    overflow: hidden;
}

.sidebar.collapsed {
    width: 74px;
}

.sidebar h2 {
    font-size: 18px;
    transition: opacity 0.3s;
}

.sidebar.collapsed h2 {
    opacity: 0;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    text-decoration: none;
    margin: 15px 0;
    padding: 8px;
    border-radius: 6px;
    white-space: nowrap;
}

.sidebar a:hover {
    background: #1f2937;
}

.sidebar.collapsed a span {
    display: none;
}

/* BOTÃO */
.toggle-btn {
    cursor: pointer;
    margin-bottom: 20px;
    font-size: 20px;
}

/* CONTEÚDO */
.content {
    margin-left: 220px;
    padding: 30px;
    width: calc(100vw - 220px);
    max-width: calc(100vw - 220px);
    min-width: 0;
    transition: margin-left 0.3s ease, width 0.3s ease;
    overflow-x: hidden;
}

.content.expanded {
    margin-left: 74px;
    width: calc(100vw - 74px);
    max-width: calc(100vw - 74px);
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>

    <h2>📊 Sistema</h2>

    <a href="/home">
        🏠 <span>Início</span>
    </a>

    <a href="/">
        📦 <span>Painel Estratégico</span>
    </a>

    <a href="/?tela=enviando">
        🚚 <span>Enviando (<span id="contEnvSidebar">0</span>)</span>
    </a>

    <a href="/?tela=homologar">
        🧪 <span>Homologar (<span id="contHomSidebar">0</span>)</span>
    </a>

    <a href="/?tela=naoEnviar">
        ❌ <span>Não Enviar (<span id="contNaoSidebar">0</span>)</span>
    </a>


    <a href="/metricas-full">
        📦 <span>Lotes de Envio</span>
    </a>    

    <a href="/conferencia">
        📋 <span>Conferência</span>
    </a>

    <a href="/picking">
        📲 <span>Picking</span>
    </a>
</div>

<div class="content" id="content">
    {% block content %}{% endblock %}
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");
    
        sidebar.classList.toggle("collapsed");
        content.classList.toggle("expanded");
    }
    
    function montarLinkComFiltros(hrefBase) {
        const urlAtual = new URLSearchParams(window.location.search);
        const urlDestino = new URL(hrefBase, window.location.origin);
    
        urlAtual.forEach((valor, chave) => {
            if (!urlDestino.searchParams.has(chave)) {
                urlDestino.searchParams.set(chave, valor);
            }
        });
    
        const query = urlDestino.searchParams.toString();
        return urlDestino.pathname + (query ? "?" + query : "");
    }
    
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("#sidebar a").forEach(link => {
            const hrefOriginal = link.getAttribute("href");
    
            if (!hrefOriginal || hrefOriginal.startsWith("#") || hrefOriginal.startsWith("javascript:")) {
                return;
            }
    
            link.setAttribute("href", montarLinkComFiltros(hrefOriginal));
        });
    });
    </script>

</body>
</html>
